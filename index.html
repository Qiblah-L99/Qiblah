<title>Qiblah</title>

<style>
:root {
  --bg: #f5f0e8; --bg2: #ede8de; --bg3: #e5dfd4;
  --card: #ffffff; --card2: #f0ebe0;
  --gold: #9b7f4e; --gold2: #7d6338;
  --text: #1e1c18; --muted: #7a7060;
  --border: rgba(0,0,0,0.07); --radius: 16px;
}
html, body { background: #f5f0e8 !important; margin: 0 !important; padding: 0 !important; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f5f0e8; color: #1e1c18; min-height: 100vh; overflow-x: hidden; }
nav { position: sticky; top: 0; z-index: 100; background: rgba(245,240,232,0.94); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--text); text-decoration: none; }
.nav-links { display: flex; gap: 4px; align-items: center; }
.nav-link { padding: 6px 16px; border-radius: 8px; font-size: 14px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; border: none; background: none; font-family: inherit; }
.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.nav-link.active { background: rgba(155,127,78,0.12); color: var(--gold); }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.hero { text-align: center; padding: 80px 32px 60px; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(155,127,78,0.08) 0%, transparent 70%); pointer-events: none; }
.hero h1 { font-size: clamp(36px, 5vw, 56px); font-weight: 800; line-height: 1.1; margin-bottom: 16px; }
.hero h1 .accent { color: var(--gold); }
.hero p { font-size: 17px; color: var(--muted); max-width: 520px; margin: 0 auto 48px; line-height: 1.6; }
.feature-icons { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
.feat-icon { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
.feat-icon-box { width: 72px; height: 72px; border-radius: 18px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
.feat-icon-box:hover { transform: scale(1.06); }
.feat-icon span { font-size: 12px; color: var(--muted); }
.feat-qibla { background: linear-gradient(135deg, #f59e0b, #d97706); }
.feat-quran { background: linear-gradient(135deg, #10b981, #059669); }
.feat-duas { background: linear-gradient(135deg, #ec4899, #db2777); }
.feat-calendar { background: linear-gradient(135deg, #6366f1, #4f46e5); }
.hero-slider { margin: 16px 16px 0; border-radius: var(--radius); overflow: hidden; position: relative; }
@media (min-width: 768px) { .hero-slider { margin: 16px 32px 0; } .slide-content { padding: 120px 28px 24px; } }
.slider-track { display: flex; height: 100%; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
.slide { min-width: 100%; position: relative; flex-shrink: 0; }
.slide-img { position: absolute; inset: 0; background-size: cover; background-position: center center; }
.slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(20,20,20,0.95) 0%, rgba(20,20,20,0.6) 50%, rgba(20,20,20,0.2) 100%); }
.slide-content { position: relative; z-index: 2; padding: 100px 20px 20px; display: flex; flex-direction: column; justify-content: flex-end; }
.slide-label { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: #f87171; margin-bottom: 8px; text-transform: uppercase; }
.slide-label.sponsored { color: #fbbf24; }
.slide-content h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: #ffffff; line-height: 1.25; }
.slide-content p { font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 14px; line-height: 1.5; white-space: normal; overflow: visible; }
.slide-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--gold); color: #ffffff; font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; width: fit-content; text-decoration: none; }
.slider-dots { position: absolute; bottom: 10px; right: 14px; display: flex; gap: 5px; z-index: 5; }
.slider-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.2s; border: none; padding: 0; }
.slider-dot.active { background: #ffffff; width: 18px; border-radius: 3px; }
.slider-nav { position: absolute; top: 50%; transform: translateY(-50%); z-index: 5; background: rgba(255,255,255,0.15); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; backdrop-filter: blur(4px); }
.slider-nav.prev { left: 10px; }
.slider-nav.next { right: 10px; }
.section { padding: 0 32px 48px; }
.section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
.section-header h2 { font-size: 18px; font-weight: 700; }
.section-header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
.view-all { color: var(--gold); font-size: 14px; font-weight: 500; cursor: pointer; background: none; border: none; font-family: inherit; }
.mosque-grid { display: flex; flex-direction: column; gap: 8px; }
.mosque-card { background: var(--card); border: 1px solid rgba(0,0,0,0.07); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.2s; width: 100%; }
.mosque-card:hover { border-color: rgba(155,127,78,0.3); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.mosque-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
.mosque-card-body { padding: 16px; }
.mosque-card-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.mosque-card-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; font-size: 12px; color: var(--muted); }
.mosque-card-row svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; color: var(--gold); }
.mosque-tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
.mosque-card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--border); margin-top: 4px; }
.view-details { color: var(--gold); font-size: 12px; font-weight: 500; text-decoration: none; }
.area-badge { font-size: 10px; padding: 2px 7px; border-radius: 6px; background: var(--bg3); color: var(--muted); border: 1px solid var(--border); white-space: nowrap; font-weight: 500; }
.mosques-header { padding: 32px 32px 0; }
.mosques-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.mosques-count { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
.search-bar-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.search-wrap { flex: 1; position: relative; }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); pointer-events: none; }
.search-wrap input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px 10px 40px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
.search-wrap input:focus { border-color: rgba(240,165,0,0.4); }
.search-wrap input::placeholder { color: var(--muted); }
.view-toggle { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.view-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: none; color: var(--muted); }
.view-btn.active { background: rgba(155,127,78,0.15); color: var(--gold); }
.view-btn svg { width: 18px; height: 18px; }
.locate-btn { display: flex; align-items: center; gap: 8px; background: rgba(155,127,78,0.1); border: 1px solid rgba(155,127,78,0.25); color: var(--gold); font-size: 13px; font-weight: 500; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-family: inherit; white-space: nowrap; }
.locate-btn svg { width: 15px; height: 15px; }
.area-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding-bottom: 4px; }
.area-btn { font-size: 12px; font-family: inherit; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.area-btn.active { background: rgba(155,127,78,0.15); color: var(--gold); border-color: rgba(155,127,78,0.3); }
.mosques-results { padding: 20px 32px 48px; }
.mosque-list-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: grid; grid-template-columns: 160px 1fr; cursor: pointer; transition: border-color 0.2s; margin-bottom: 12px; }
.mosque-list-card:hover { border-color: rgba(155,127,78,0.3); }
.mosque-list-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mosque-list-body { padding: 18px 20px; }
.mosque-list-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.loading-state { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(245,240,232,0.97); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding: 8px 0 12px; z-index: 100; box-shadow: 0 -2px 12px rgba(0,0,0,0.1); }
.mobile-nav-inner { display: flex; justify-content: space-around; }
.mobile-nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); cursor: pointer; padding: 4px 12px; border: none; background: none; font-family: inherit; }
.mobile-nav-btn.active { color: var(--gold); font-weight: 600; }
.mobile-nav-btn svg { width: 22px; height: 22px; }
@media (max-width: 768px) {
  nav .nav-links { display: none; }
  .mobile-nav { display: block; }
  #masajid-app { padding-bottom: 72px; }
  .hero { padding: 40px 20px 40px; }
  .section { padding: 0 16px 32px; }
  .charity-banner { margin: 0 16px 32px; }
  .mosques-header { padding: 24px 16px 0; }
  .mosques-results { padding: 16px 16px 32px; }
  .mosque-grid { grid-template-columns: 1fr; }
  .mosque-list-card { grid-template-columns: 100px 1fr; }
  nav { padding: 0 16px; }
}

.con-icon { width: 32px; height: 32px; background: rgba(155,127,78,0.08); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

<script>
var IMGS = [];

var MOSQUES = [];

var SVC_COLORS = {
  'Education': {bg:'rgba(13,148,136,0.14)',  color:'#0f766e'},
  'Youth':     {bg:'rgba(194,65,12,0.12)',   color:'#c2410c'},
  'Community': {bg:'rgba(4,120,87,0.14)',    color:'#065f46'},
  'Welfare':   {bg:'rgba(190,18,60,0.12)',   color:'#9f1239'},
  'Health':    {bg:'rgba(3,105,161,0.14)',   color:'#075985'},
  'Sports':    {bg:'rgba(109,40,217,0.14)',  color:'#5b21b6'}
};

function svcColor(type) {
  return SVC_COLORS[type] || {bg:'rgba(255,255,255,0.08)',color:'var(--muted)'};
}

function svcIcon(type) {
  if (type === 'Education') return '<path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/>';
  if (type === 'Youth')     return '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>';
  if (type === 'Welfare')   return '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>';
  return '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>';
}

var activeServiceType = 'All';
var activeArea = 'All';
var currentView = 'grid';

function initServiceFilters() {
  var types = ['All','Education','Youth','Welfare','Community'];
  var el = document.getElementById('service-filters');
  if (!el) return;
  el.innerHTML = types.map(function(t) {
    return '<button class="area-btn' + (t === 'All' ? ' active' : '') + '" onclick="setServiceType(\'' + t + '\')">' + t + '</button>';
  }).join('');
}

function setServiceType(type) {
  activeServiceType = type;
  document.querySelectorAll('#service-filters .area-btn').forEach(function(b){ b.classList.toggle('active', b.textContent === type); });
  filterServices();
}

function filterServices() {
  var input = document.getElementById('service-search');
  var q = input ? input.value.toLowerCase() : '';
  var hasFilter = !!q || activeServiceType !== 'All';
  var base = (!hasFilter && nearestMosques20) ? nearestMosques20 : MOSQUES;
  var results = [];

  // Mosque services
  base.forEach(function(m) {
    var mi = MOSQUES.indexOf(m);
    if (!m.services) return;
    m.services.forEach(function(s) {
      if ((activeServiceType === 'All' || s.type === activeServiceType) &&
          (s.name.toLowerCase().indexOf(q) > -1 || m.name.toLowerCase().indexOf(q) > -1)) {
        results.push({service: s, mosque: m, mosqueIdx: mi, isInstitute: false});
      }
    });
  });
  if (!results.length && !hasFilter) {
    MOSQUES.forEach(function(m) {
      var mi = MOSQUES.indexOf(m);
      if (!m.services) return;
      m.services.forEach(function(s) {
        results.push({service: s, mosque: m, mosqueIdx: mi, isInstitute: false});
      });
    });
  }

  // Institute services merged in
  INSTITUTES.forEach(function(inst, ii) {
    if (!inst.services) return;
    inst.services.forEach(function(s) {
      if ((activeServiceType === 'All' || s.type === activeServiceType) &&
          (s.name.toLowerCase().indexOf(q) > -1 || inst.name.toLowerCase().indexOf(q) > -1 || inst.area.toLowerCase().indexOf(q) > -1)) {
        results.push({service: s, mosque: {name: inst.name, area: inst.area}, mosqueIdx: ii, isInstitute: true});
      }
    });
  });

  renderServices(results);
}

function renderServices(results) {
  var el = document.getElementById('service-results');
  if (!el) return;

  // Sponsored institutes slot — sits above everything
  var sponsoredInsts = INSTITUTES.filter(function(inst){ return inst.featured; });
  var instSlotHtml = '';
  if (sponsoredInsts.length === 1) {
    instSlotHtml = buildSponsoredInstituteCard(sponsoredInsts[0], INSTITUTES.indexOf(sponsoredInsts[0]));
  } else if (sponsoredInsts.length > 1) {
    instSlotHtml = '<div class="sponsored-slider">' +
      '<div class="sponsored-track-wrap">' +
        '<div class="sponsored-track" id="inst-track">' +
          sponsoredInsts.map(function(inst){ return '<div class="sponsored-slide">' + buildSponsoredInstituteCard(inst, INSTITUTES.indexOf(inst)) + '</div>'; }).join('') +
        '</div>' +
      '</div>' +
    '</div>';
    startAutoSlide('inst', sponsoredInsts.length);
  }

  if (!results.length && !instSlotHtml) { el.innerHTML = '<div class="loading-state">No services found</div>'; return; }

  var featured = results.filter(function(r){ return r.service.featured; });
  var regular  = results.filter(function(r){ return !r.service.featured; });

  var svcSlotHtml = '';
  if (featured.length === 1) {
    svcSlotHtml = buildFeaturedServiceCard(featured[0]);
  } else if (featured.length > 1) {
    svcSlotHtml = '<div class="sponsored-slider">' +
      '<div class="sponsored-track-wrap">' +
        '<div class="sponsored-track" id="svc-track">' +
          featured.map(function(r){ return '<div class="sponsored-slide">' + buildFeaturedServiceCard(r) + '</div>'; }).join('') +
        '</div>' +
      '</div>' +
    '</div>';
    startAutoSlide('svc', featured.length);
  }

  el.innerHTML = instSlotHtml + svcSlotHtml + regular.map(function(r) {
    var s = r.service, m = r.mosque, c = svcColor(s.type);
    var clickHandler = r.isInstitute ? 'openInstitute(' + r.mosqueIdx + ')' : 'openDetail(' + r.mosqueIdx + ')';
    return '<div class="service-card" onclick="' + clickHandler + '">' +
      '<div class="service-icon" style="background:' + c.bg + '">' +
        '<svg viewBox="0 0 24 24" fill="' + c.color + '">' + svcIcon(s.type) + '</svg>' +
      '</div>' +
      '<div style="position:absolute;top:10px;right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:7px">' +
        '<span style="font-size:10px;font-weight:600;color:' + c.color + ';background:' + c.bg + ';padding:2px 7px;border-radius:5px">' + s.type + '</span>' +
        (s.days || s.time ? '<span style="font-size:10px;color:var(--muted);text-align:right">' + (s.days||'') + (s.time?(s.days?' ':'')+s.time.replace(/\s*(AM|PM)\s*$/i,'').trim():'') + '</span>' : '') +
      '</div>' +
      '<div class="service-body" style="padding-right:64px">' +
        '<div class="service-name">' + s.name + '</div>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:3px">' + m.name + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function buildSponsoredInstituteCard(inst, idx) {
  return '<div class="sponsored-card" onclick="openInstitute(' + idx + ')">' +
    '<div class="featured-badge">' +
      '<svg width="10" height="10" viewBox="0 0 24 24" fill="#9b7f4e"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' +
      '<span>FEATURED</span>' +
    '</div>' +
    '<div class="sponsored-card-body">' +
      '<div class="sponsored-card-title">' + inst.name + '</div>' +
      '<div class="sponsored-card-sub">' + (inst.type||'') + (inst.area ? ' · ' + inst.area : '') + '</div>' +
      (inst.about ? '<div class="sponsored-card-desc">' + inst.about + '</div>' : '') +
    '</div>' +
  '</div>';
}

function buildFeaturedServiceCard(r) {
  var s = r.service, m = r.mosque;
  var clickHandler = r.isInstitute ? 'openInstitute(' + r.mosqueIdx + ')' : 'openDetail(' + r.mosqueIdx + ')';
  var rawTime = (s.time||'').replace(/\s*(AM|PM)\s*$/i, '').trim();
  var meta = [s.type, s.days, rawTime].filter(Boolean).join(' · ');
  return '<div class="sponsored-card" onclick="' + clickHandler + '">' +
    '<div class="featured-badge">' +
      '<svg width="10" height="10" viewBox="0 0 24 24" fill="#9b7f4e"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' +
      '<span>FEATURED</span>' +
    '</div>' +
    '<div class="sponsored-card-body">' +
      '<div class="sponsored-card-title">' + s.name + '</div>' +
      '<div class="sponsored-card-sub">' + m.name + '</div>' +
      (meta ? '<div class="sponsored-card-desc">' + meta + '</div>' : '') +
    '</div>' +
  '</div>';
}


// Global nearest mosques set by location detection
var nearestMosques20 = null;
var userLat = null, userLng = null;

function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('[data-page]').forEach(function(b){ b.classList.toggle('active', b.dataset.page === id); });
  if (id === 'mosques') { filterMosques(); }
  if (id === 'services') { filterServices(); }
  if (id === 'online') { filterCourses(); }
}

var activeJummahArea = 'All';

function renderJummah(mosques) {
  var el = document.getElementById('jummah-results');
  if (!el) return;
  if (!mosques.length) { el.innerHTML = '<div class="loading-state">No results found</div>'; return; }

  // Group by borough (via BOROUGH_AREAS lookup), then by area within borough
  var boroughOrder = Object.keys(BOROUGH_AREAS);
  var groups = {};
  var usedBoroughs = [];

  mosques.forEach(function(m) {
    var borough = 'Other';
    boroughOrder.forEach(function(b) {
      if (BOROUGH_AREAS[b].indexOf(m.area) > -1) borough = b;
    });
    if (!groups[borough]) { groups[borough] = []; usedBoroughs.push(borough); }
    groups[borough].push({ mosque: m, idx: MOSQUES.indexOf(m) });
  });

  // Keep borough order consistent
  usedBoroughs = usedBoroughs.filter(function(v, i, a) { return a.indexOf(v) === i; });
  usedBoroughs.sort(function(a, b) {
    return boroughOrder.indexOf(a) - boroughOrder.indexOf(b);
  });

  el.innerHTML = usedBoroughs.map(function(borough) {
    var entries = groups[borough];
    // Sort entries within borough alphabetically by area then name
    entries.sort(function(a, b) {
      if (a.mosque.area !== b.mosque.area) return a.mosque.area.localeCompare(b.mosque.area);
      return a.mosque.name.localeCompare(b.mosque.name);
    });
    var rows = entries.map(function(e) {
      return '<div class="mosque-card" onclick="openDetail(' + e.idx + ')" style="cursor:pointer;display:flex;align-items:center;gap:14px;padding:14px 16px;position:relative;margin-bottom:8px">' +

          '<span style="font-size:11px;color:var(--gold)">Jummah: ' + e.mosque.jummah + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div style="margin-bottom:24px">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">' +
        '<span style="font-size:15px;font-weight:700;color:var(--text)">' + borough + '</span>' +
        '<span style="font-size:12px;color:var(--muted)">' + entries.length + ' mosque' + (entries.length !== 1 ? 's' : '') + '</span>' +
        '<div style="flex:1;height:1px;background:var(--border)"></div>' +
      '</div>' +
      rows +
    '</div>';
  }).join('');
}

function getNextJamaah(mosqueTimes) {
  if (!mosqueTimes || !mosqueTimes.length) return null;
  var now = new Date();
  var nowMins = now.getHours() * 60 + now.getMinutes();
  for (var i = 0; i < mosqueTimes.length; i++) {
    var t = mosqueTimes[i].jamaah;
    if (!t) continue;
    var parts = t.split(':');
    var pMins = parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
    if (nowMins < pMins) {
      return { name: mosqueTimes[i].name, time: fmt12(t) };
    }
  }
  return null;
}

function startHomeCd(prayers) {
  if (window._homeCdTimer) clearInterval(window._homeCdTimer);
  function toMins(t) {
    if (!t || t === '--') return 9999;
    var isPM = t.indexOf('PM') > -1, isAM = t.indexOf('AM') > -1;
    t = t.replace(/ AM| PM/g,'').trim();
    var p = t.split(':'), h = parseInt(p[0]), m = parseInt(p[1]||0);
    if (isPM && h !== 12) h += 12;
    if (isAM && h === 12) h = 0;
    return h * 60 + m;
  }
  function padZ(n) { return n < 10 ? '0' + n : '' + n; }
  function tick() {
    var now = new Date(), nowM = now.getHours()*60 + now.getMinutes(), nowS = now.getSeconds();
    var next = null;
    for (var i = 0; i < prayers.length; i++) {
      var pm = toMins(prayers[i].jamaah);
      if (pm === 9999) continue;
      if (nowM < pm) { next = prayers[i]; break; }
    }
    var timerEl = document.getElementById('home-cd-timer');
    if (!timerEl) { clearInterval(window._homeCdTimer); return; }
    if (!next) { timerEl.textContent = '--'; if (nameEl) nameEl.textContent = ''; return; }
    var pm = toMins(next.jamaah);
    var diffSecs = (pm - nowM) * 60 - nowS;
    var h = Math.floor(diffSecs/3600), mn = Math.floor((diffSecs%3600)/60), s = diffSecs%60;
    timerEl.textContent = (h > 0 ? h + ':' + padZ(mn) : mn) + ':' + padZ(s);
  }
  tick();
  window._homeCdTimer = setInterval(tick, 1000);
}

function haversine(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function todayISO() {
  var d = new Date();
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function tomorrowISO() {
  var d = new Date(); d.setDate(d.getDate()+1);
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function fmt12(t) {
  if (!t) return '';
  // Strip any existing AM/PM suffix and whitespace
  t = t.replace(/\s*(AM|PM)\s*$/i, '').trim();
  var p = t.split(':');
  var h = parseInt(p[0]);
  var m = (p[1]||'00').replace(/[^0-9]/g,'').slice(0,2).padStart(2,'0');
  if (isNaN(h)) return '';
  var ap = h >= 12 ? 'PM' : 'AM';
  var h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return h12 + ':' + m + ' ' + ap;
}

function openDetail(idx) {
  var m = MOSQUES[idx] || null;
  if (!m) return;
  var img = '';

  var prayers = [
    {name:'Fajr',   begins:'--', jamaah:'--', tomorrow:'--', next: false},
    {name:'Zuhr',   begins:'--', jamaah:'--', tomorrow:'--', next: false},
    {name:'Asr',    begins:'--', jamaah:'--', tomorrow:'--', next: false},
    {name:'Maghrib',begins:'--', jamaah:'--', tomorrow:'--', next: false},
    {name:'Isha',   begins:'--', jamaah:'--', tomorrow:'--', next: false}
  ];

  // Try to fetch from Supabase
  var slug = m._slug || MOSQUE_SLUG_MAP[m.name];
  var today = todayISO();
  var tomorrow = tomorrowISO();

  function renderWithPrayers(prayers, liveM) {
    renderDetailPage(idx, liveM || m, img, prayers);
  }

  if (slug || m._id) {
    var fetchUrl = m._id
      ? 'mosques?id=eq.' + m._id + '&select=*,prayer_timetables(date,fajr_begins,fajr_jamaah,zuhr_begins,zuhr_jamaah,asr_begins,asr_jamaah,maghrib_begins,maghrib_jamaah,isha_begins,isha_jamaah)&prayer_timetables.date=in.(' + today + ',' + tomorrow + ')'
      : 'mosques?slug=eq.' + slug + '&select=*,prayer_timetables(date,fajr_begins,fajr_jamaah,zuhr_begins,zuhr_jamaah,asr_begins,asr_jamaah,maghrib_begins,maghrib_jamaah,isha_begins,isha_jamaah)&prayer_timetables.date=in.(' + today + ',' + tomorrow + ')';
    sbGet(fetchUrl)
      .then(function(rows) {
        if (!rows || !rows.length) { renderWithPrayers(prayers); return; }
        var dbM = rows[0];

        // Merge live profile data into m, including live services
        var liveM = Object.assign({}, m, {
          phone:    dbM.phone    || m.phone    || '',

          email:    dbM.email    || m.email    || '',
          about:    dbM.about    || m.about    || '',

          _id:      dbM.id
        });

        // Process prayer times
        var ttRows = dbM.prayer_timetables || [];
        var todayRow = ttRows.find(function(r){ return r.date === today; });
        var tomRow   = ttRows.find(function(r){ return r.date === tomorrow; });

        if (todayRow) {
          var nowMins = new Date().getHours()*60 + new Date().getMinutes();
          prayers = [
            {name:'Fajr',   begins:fmt12(todayRow.fajr_begins),   jamaah:fmt12(todayRow.fajr_jamaah),   tomorrow:fmt12(tomRow&&tomRow.fajr_jamaah||'')},
            {name:'Zuhr',   begins:fmt12(todayRow.zuhr_begins),   jamaah:fmt12(todayRow.zuhr_jamaah),   tomorrow:fmt12(tomRow&&tomRow.zuhr_jamaah||'')},
            {name:'Asr',    begins:fmt12(todayRow.asr_begins),    jamaah:fmt12(todayRow.asr_jamaah),    tomorrow:fmt12(tomRow&&tomRow.asr_jamaah||'')},
            {name:'Maghrib',begins:fmt12(todayRow.maghrib_begins),jamaah:fmt12(todayRow.maghrib_jamaah),tomorrow:fmt12(tomRow&&tomRow.maghrib_jamaah||'')},
            {name:'Isha',   begins:fmt12(todayRow.isha_begins),   jamaah:fmt12(todayRow.isha_jamaah),   tomorrow:fmt12(tomRow&&tomRow.isha_jamaah||'')}
          ];
          var found = false;
          prayers.forEach(function(p) {
            if (!found && p.jamaah && p.jamaah !== '--') {
              var parts = p.jamaah.replace(' AM','').replace(' PM','').split(':');
              var h = parseInt(parts[0]), mn = parseInt(parts[1]||0);
              if (p.jamaah.indexOf('PM')>-1 && h!==12) h+=12;
              if (p.jamaah.indexOf('AM')>-1 && h===12) h=0;
              if (nowMins < h*60+mn) { p.next = true; found = true; }
            }
          });
        }
        renderWithPrayers(prayers, liveM);
      }).catch(function(){ renderWithPrayers(prayers); });
  } else {
    renderWithPrayers(prayers);
  }
}

    if (!t || t === '--') return { name: p.name, time: '00:00' };
    var isPM = t.indexOf('PM') > -1;
    var isAM = t.indexOf('AM') > -1;
    t = t.replace(' AM','').replace(' PM','').trim();
    var parts = t.split(':');
    var h = parseInt(parts[0]), m = parseInt(parts[1]||0);
    if (isPM && h !== 12) h += 12;
    if (isAM && h === 12) h = 0;
    return { name: p.name, time: ('0'+h).slice(-2) + ':' + ('0'+m).slice(-2) };

  function padZ(n) { return n<10?'0'+n:n; }

  function updateCd() {
    var now = new Date();
    var nowM = now.getHours()*60+now.getMinutes();

      if (nowM < pm) { next = cdPrayers[i]; prevM = i>0?toMins(cdPrayers[i-1].time):0; break; }
      if (i===cdPrayers.length-1) { next = cdPrayers[0]; prevM = pm; }
    }
    var nextM = toMins(next.time);
    var diffSecs;
    if (nowM < nextM) { diffSecs = (nextM - nowM)*60 - now.getSeconds(); }
    else { diffSecs = (24*60 - nowM + nextM)*60 - now.getSeconds(); }
    var totalSecs = (nextM - prevM)*60; if(totalSecs<0) totalSecs+=24*60*60;
    var pct = totalSecs>0 ? Math.max(0,Math.min(100,(1-diffSecs/totalSecs)*100)) : 0;
    var h=Math.floor(diffSecs/3600), mn=Math.floor((diffSecs%3600)/60), s=diffSecs%60;

    var cc=document.getElementById('cd-countdown-'+idx);
    var cb=document.getElementById('cd-bar-'+idx);
    if(nm) nm.textContent=next.name;
    if(cc) cc.textContent=(h>0?h+':':'')+padZ(mn)+':'+padZ(s);
    if(cb) cb.style.width=pct+'%';
  }
  if(cdTimer) clearInterval(cdTimer);
  updateCd();
  cdTimer = setInterval(updateCd, 1000);
}

//     HERO SLIDER                                                  
var sliderIdx = 0;
var sliderTotal = 0;
var sliderTimer = null;

function initSlider() {
  var track = document.getElementById('slider-track');
  var dotsEl = document.getElementById('slider-dots');
  if (!track || !dotsEl) return;
  sliderTotal = track.children.length;
  dotsEl.innerHTML = '';
  for (var i = 0; i < sliderTotal; i++) {
    var dot = document.createElement('button');
    dot.className = 'slider-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('data-i', i);
    dot.onclick = (function(n){ return function(){ goToSlide(n); }; })(i);
    dotsEl.appendChild(dot);
  }
  startSliderAuto();

  // Touch/swipe support
  var startX = 0;
  var slider = document.getElementById('hero-slider');
  slider.addEventListener('touchstart', function(e){ startX = e.touches[0].clientX; }, {passive:true});
  slider.addEventListener('touchend', function(e){
    var diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) slideBy(diff > 0 ? 1 : -1);
  }, {passive:true});
}

function goToSlide(n) {
  sliderIdx = (n + sliderTotal) % sliderTotal;
  document.getElementById('slider-track').style.transform = 'translateX(-' + (sliderIdx * 100) + '%)';
  document.querySelectorAll('.slider-dot').forEach(function(d, i) {
    d.classList.toggle('active', i === sliderIdx);
  });
  resetSliderAuto();
}

function slideBy(dir) { goToSlide(sliderIdx + dir); }

function startSliderAuto() {
  sliderTimer = setInterval(function(){ goToSlide(sliderIdx + 1); }, 5000);
}

function resetSliderAuto() {
  clearInterval(sliderTimer);
  startSliderAuto();
}

function setCourseType(type) {
  activeCourseType = type;
  document.querySelectorAll('#course-filters .area-btn').forEach(function(b){ b.classList.toggle('active', b.textContent === type); });
  filterCourses();
}

var sliderTimers = {};
function startAutoSlide(id, count) {
  if (count <= 1) return;
  clearInterval(sliderTimers[id]);
  sliderTimers[id + '_idx'] = 0;
  sliderTimers[id] = setInterval(function() {
    sliderTimers[id + '_idx'] = (sliderTimers[id + '_idx'] + 1) % count;
    var track = document.getElementById(id + '-track');
    if (track) {
      track.style.transform = 'translateX(-' + (sliderTimers[id + '_idx'] * 100) + '%)';
    } else {
      clearInterval(sliderTimers[id]);
    }
  }, 3000);
}

function buildFeaturedCourseCard(c) {
  return '<div class="sponsored-card" onclick="window.open(\'' + c.url + '\',\'_blank\')">' +
    '<div class="featured-badge">' +
      '<svg width="10" height="10" viewBox="0 0 24 24" fill="#9b7f4e"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' +
      '<span>FEATURED</span>' +
    '</div>' +
    '<div class="sponsored-card-body">' +
      '<div class="sponsored-card-title">' + c.name + '</div>' +
      '<div class="sponsored-card-sub">' + c.provider + '</div>' +
      (c.desc ? '<div class="sponsored-card-desc">' + c.desc + '</div>' : '') +
    '</div>' +
  '</div>';
}


function filterCourses() {
  var input = document.getElementById('online-search');
  var q = input ? input.value.toLowerCase() : '';
  // Only the first sponsored course goes in the slot — extras stay in the main list
  var firstFeaturedUsed = false;
  var filtered = COURSES.filter(function(c) {
    if (c.sponsored && !firstFeaturedUsed) { firstFeaturedUsed = true; return false; }
    var typeMatch = activeCourseType === 'All' || c.type === activeCourseType;
    var textMatch = !q || c.name.toLowerCase().indexOf(q) > -1 || c.provider.toLowerCase().indexOf(q) > -1 || c.desc.toLowerCase().indexOf(q) > -1;
    return typeMatch && textMatch;
  });
  renderCourses(filtered);
}

function renderCourses(courses) {
  var el = document.getElementById('online-list') || document.getElementById('online-results');
  if (!el) return;
  if (!courses.length) { el.innerHTML = '<div class="loading-state">No courses found</div>'; return; }

  // Sponsored courses - build slider if multiple
  var featuredCourses = COURSES.filter(function(c){ return c.sponsored; });
  var sponsoredHtml = '';
  if (featuredCourses.length === 1) {
    sponsoredHtml = buildFeaturedCourseCard(featuredCourses[0]);
  } else if (featuredCourses.length > 1) {
    sponsoredHtml = '<div class="sponsored-slider">' +
      '<div class="sponsored-track-wrap">' +
        '<div class="sponsored-track" id="course-track">' +
          featuredCourses.map(function(c){ return '<div class="sponsored-slide">' + buildFeaturedCourseCard(c) + '</div>'; }).join('') +
        '</div>' +
      '</div>' +
    '</div>';
    startAutoSlide('course', featuredCourses.length);
  }

  el.innerHTML = sponsoredHtml + courses.map(function(c) {
    var col = courseTypeColor(c.type);
    var iconPath = 'M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z';
    return '<div class="service-card" onclick="window.open(\'' + c.url + '\',\'_blank\')">' +
      '<div class="service-icon" style="background:' + col.bg + '">' +
        '<svg viewBox="0 0 24 24" fill="' + col.color + '"><path d="' + iconPath + '"/></svg>' +
      '</div>' +
      '<div style="position:absolute;top:10px;right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:7px">' +
        '<span style="font-size:10px;font-weight:600;color:' + col.color + ';background:' + col.bg + ';padding:2px 7px;border-radius:5px">' + (c.type||'') + '</span>' +
        (c.level ? '<span style="font-size:10px;color:var(--muted);text-align:right">' + c.level + '</span>' : '') +
      '</div>' +
      '<div class="service-body" style="padding-right:80px">' +

      '</div>' +
    '</div>';
  }).join('');
}

function loadMosquesFromSupabase() {
  document.getElementById('home-grid').innerHTML = '<div class="loading-state">Loading mosques...</div>';
  document.getElementById('mosque-results').innerHTML = '<div class="loading-state">Loading mosques...</div>';

  var p1 = sbGet('mosques?select=id,slug,name,address,area,borough,jummah,phone,website,email,about,url,lat,lon&order=name');
  var p2 = sbGet('services?select=mosque_id,name,type,days,time,is_featured');
  var p3 = sbGet('courses?select=*&order=name&active=eq.true');
  var p4 = sbGet('institutes?select=id,name,address,area,borough,phone,website,type,about,is_featured&order=name');
  var p5 = sbGet('institute_services?select=institute_id,name,type,days,time,is_featured');
  var _d = new Date(); var today = _d.getFullYear() + '-' + ('0'+(_d.getMonth()+1)).slice(-2) + '-' + ('0'+_d.getDate()).slice(-2);
  var p6 = sbGet('prayer_timetables?date=eq.' + today + '&select=mosque_id,fajr_jamaah,zuhr_jamaah,asr_jamaah,maghrib_jamaah,isha_jamaah');
  Promise.all([p1, p2, p3, p4, p5, p6])
    .then(function(results) {
      var mosqueRows   = results[0] || [];
      var svcRows      = results[1] || [];
      var courseRows   = results[2] || [];
      var instRows     = results[3] || [];
      var instSvcRows  = results[4] || [];
      var timesRows    = results[5] || [];
      var bannerRows   = results[6] || [];
      var now = new Date();
      var todayStr = now.toISOString().split('T')[0]; // YYYY-MM-DD
      BANNERS = bannerRows.filter(function(b) {
        if (b.start_date && b.start_date > todayStr) return false;
        if (b.end_date   && b.end_date   < todayStr) return false;
        return true;
      });

      // Build today's prayer time lookup by mosque_id
      var timesByMosque = {};
      timesRows.forEach(function(r) {
        timesByMosque[r.mosque_id] = [
          {name:'Fajr',    jamaah: r.fajr_jamaah    || ''},
          {name:'Zuhr',    jamaah: r.zuhr_jamaah    || ''},
          {name:'Asr',     jamaah: r.asr_jamaah     || ''},
          {name:'Maghrib', jamaah: r.maghrib_jamaah || ''},
          {name:'Isha',    jamaah: r.isha_jamaah    || ''}
        ];
      });

      if (!mosqueRows.length) { console.warn('No mosques from Supabase'); initApp(); return; }

      // Build service lookup by mosque_id
      var svcByMosque = {};
      svcRows.forEach(function(s) {
        if (!svcByMosque[s.mosque_id]) svcByMosque[s.mosque_id] = [];
        svcByMosque[s.mosque_id].push({ name: s.name, type: s.type||'Community', days: s.days||'', time: s.time||'', featured: s.is_featured||false });
      });

      // Build institute_services lookup
      var svcByInst = {};
      instSvcRows.forEach(function(s) {
        if (!svcByInst[s.institute_id]) svcByInst[s.institute_id] = [];
        svcByInst[s.institute_id].push({ name: s.name, type: s.type||'Education', days: s.days||'', time: s.time||'', featured: s.is_featured||false });
      });

      // Populate MOSQUES
      MOSQUES = mosqueRows.filter(function(m) {
        return !!timesByMosque[m.id];
      }).map(function(m) {
        return {
          name:     m.name    || '',
          address:  m.address || '',
          area:     m.area    || '',
          borough:  m.borough || '',
          jummah:   m.jummah  || '1:30 PM',
          phone:    m.phone   || '',
          website:  m.website || '',
          email:    m.email   || '',
          about:    m.about   || '',
          url:      m.url     || '',
          lat: m.lat || null,
          lon: m.lon || null,
          services: svcByMosque[m.id] || [],
          _times: timesByMosque[m.id] || null,
          _id:   m.id,
          _slug: m.slug
        };
      });

      MOSQUES.forEach(function(m) {
        if (m._slug) MOSQUE_SLUG_MAP[m.name] = m._slug;
      });

      // Populate COURSES
      COURSES = courseRows.map(function(c) {
        return {
          name:     c.name        || '',
          provider: c.provider    || '',
          type:     c.type        || 'Quran',
          level:    c.level       || '',
          price:    c.price       || 'Free',
          url:      c.url         || '',
          desc:     c.description || '',
          sponsored: c.is_sponsored || false
        };
      });

      // Populate INSTITUTES
      INSTITUTES = instRows.map(function(i) {
        return {
          name:     i.name    || '',
          address:  i.address || '',
          area:     i.area    || '',
          borough:  i.borough || '',
          phone:    i.phone   || '',
          website:  i.website || '',
          type:     i.type    || 'Islamic Centre',
          about:    i.about   || '',
          featured: i.is_featured || false,
          services: svcByInst[i.id] || [],
          _id:      i.id
        };
      });



      console.log('Loaded', MOSQUES.length, 'mosques,', COURSES.length, 'courses,', INSTITUTES.length, 'institutes');
      initApp();
    })
    .catch(function(e) {
      console.warn('Failed to load from Supabase:', e);
      initApp();
    });
}

function renderBanners() {
  function buildBannerHtml(banners) {
    if (!banners.length) return '';
    if (banners.length === 1) {
      var b = banners[0];
      var inner = '<img src="' + b.image_url + '" alt="' + (b.alt_text||'') + '" loading="lazy">';
      return b.link_url ? '<a href="' + b.link_url + '" target="_blank" rel="noopener">' + inner + '</a>' : inner;
    }
    var id = 'bnr' + Date.now();
    var html = '<div class="sponsored-slider"><div class="sponsored-track-wrap"><div class="sponsored-track" id="' + id + '-track">' +
      banners.map(function(b){
        var inner = '<img src="' + b.image_url + '" alt="' + (b.alt_text||'') + '" loading="lazy">';
        return '<div class="sponsored-slide">' + (b.link_url ? '<a href="' + b.link_url + '" target="_blank" rel="noopener">' + inner + '</a>' : inner) + '</div>';
      }).join('') +
    '</div></div></div>';
    setTimeout(function(){ startAutoSlide(id, banners.length); }, 100);
    return html;
  }

  var homeBanners   = BANNERS.filter(function(b){ return b.position === 'home'     || b.position === 'all'; });
  var svcBanners    = BANNERS.filter(function(b){ return b.position === 'services' || b.position === 'all'; });
  var onlineBanners = BANNERS.filter(function(b){ return b.position === 'online'   || b.position === 'all'; });

  var homeEl   = document.getElementById('banner-home');
  var svcEl    = document.getElementById('banner-services');
  var onlineEl = document.getElementById('banner-online');

  if (homeEl)   homeEl.innerHTML   = buildBannerHtml(homeBanners);
  if (svcEl)    svcEl.innerHTML    = buildBannerHtml(svcBanners);
  if (onlineEl) onlineEl.innerHTML = buildBannerHtml(onlineBanners);
}


function initApp() {
  renderBanners();
  initHomeLocation();
  initAreaFilters();
  initServiceFilters();
  initSlider();
  renderHomePrayerCard(null);
  renderHomeServices(null);
  renderList(MOSQUES);
  filterServices();
  initCourseFilters();
  filterCourses();
}

loadMosquesFromSupabase();
