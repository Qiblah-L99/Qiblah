<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background: #0d1f3c;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* LOADING */
  #loading {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
    background:#0d1f3c; z-index:100;
    transition: opacity 0.5s ease;
  }
  #loading.out { opacity:0; pointer-events:none; }
  .l-logo { font-size:2rem; font-weight:800; color:#c9a87a; letter-spacing:-0.02em; }
  .l-dots { display:flex; gap:7px; }
  .l-dot { width:7px; height:7px; border-radius:50%; background:#c9a87a; opacity:0.4; animation:ldot 1.2s ease-in-out infinite; }
  .l-dot:nth-child(2){animation-delay:.2s} .l-dot:nth-child(3){animation-delay:.4s}
  @keyframes ldot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

  /* ERROR */
  #error { position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:10px; background:#0d1f3c; z-index:99; }
  #error.show { display:flex; }
  #error h2 { font-size:1.6rem; font-weight:700; color:#c9a87a; }
  #error p { color:rgba(255,255,255,0.5); }

  /* APP */
  #app {
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: 1fr auto;
    height: 100vh;
    opacity:0;
    transition: opacity 0.6s ease;
  }
  #app.visible { opacity:1; }

  /* LEFT PANEL */
  .left {
    background: #0d1f3c;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .clock-section {}
  #clock {
    font-size: clamp(2.8rem, 5vw, 4.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: #fff;
  }
  #uk-date {
    font-size: clamp(1rem, 1.6vw, 1.3rem);
    font-weight: 700;
    color: #fff;
    margin-top: 10px;
  }
  #hijri-date {
    font-size: clamp(0.8rem, 1.2vw, 1rem);
    color: rgba(255,255,255,0.6);
    margin-top: 4px;
    font-weight: 400;
  }

  .mosque-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mosque-logo {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items:center; justify-content:center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .mosque-logo img { width:100%; height:100%; object-fit:contain; }
  .mosque-logo-placeholder {
    width:44px; height:44px; border-radius:50%;
    background:rgba(201,168,122,0.15);
    border: 1px solid rgba(201,168,122,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:1.2rem; color:#c9a87a; font-weight:800;
  }
  .mosque-name-text {
    font-size: clamp(1rem, 1.8vw, 1.4rem);
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }
  .mosque-address-text {
    font-size: clamp(0.7rem, 1.1vw, 0.9rem);
    color: rgba(255,255,255,0.55);
    line-height: 1.4;
  }
  .mosque-website {
    font-size: clamp(0.65rem, 1vw, 0.85rem);
    color: rgba(255,255,255,0.4);
  }

  .notice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 4px;
  }
  .notice-icon { font-size: 1.3rem; opacity: 0.6; flex-shrink:0; margin-top:1px; }
  .notice-text {
    font-size: clamp(0.65rem, 1vw, 0.82rem);
    color: rgba(255,255,255,0.45);
    font-style: italic;
    line-height: 1.5;
  }

  /* RIGHT PANEL — prayer table */
  .right {
    display: flex;
    flex-direction: column;
    background: #0d1f3c;
  }

  /* Column headers */
  .pt-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1.1fr 1fr;
    padding: 20px 40px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .pt-header span {
    font-size: clamp(0.75rem, 1.2vw, 1rem);
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-align: center;
    text-transform: none;
    letter-spacing: 0;
  }
  .pt-header span:first-child { text-align: right; padding-right: 32px; }

  /* Prayer rows */
  .pt-rows { flex: 1; display: flex; flex-direction: column; }

  .pt-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1.1fr 1fr;
    flex: 1;
    align-items: center;
    padding: 0 40px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.4s;
    position: relative;
  }
  .pt-row:last-child { border-bottom: none; }
  .pt-row.active { background: rgba(255,255,255,0.04); }
  .pt-row.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: #c9a87a;
    border-radius: 0 2px 2px 0;
  }

  .pt-name {
    font-size: clamp(1.1rem, 2vw, 1.7rem);
    font-weight: 700;
    color: #fff;
    text-align: right;
    padding-right: 32px;
    letter-spacing: -0.01em;
  }
  .pt-row.active .pt-name { color: #c9a87a; }

  .pt-cell { text-align: center; }

  .pt-begins {
    font-size: clamp(0.9rem, 1.6vw, 1.35rem);
    color: rgba(255,255,255,0.65);
    font-weight: 400;
    line-height: 1.35;
  }

  .pt-jamaah {
    font-size: clamp(1.1rem, 2.2vw, 1.9rem);
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .pt-row.active .pt-jamaah { color: #e8c98a; }

  .pt-tomorrow {
    font-size: clamp(0.9rem, 1.6vw, 1.35rem);
    font-weight: 400;
    color: rgba(255,255,255,0.65);
  }

  /* FOOTER */
  footer {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .f-cell {
    padding: 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
  }
  .f-cell:first-child { border-right: 1px solid rgba(255,255,255,0.08); }
  .f-label {
    font-size: clamp(0.6rem, 0.9vw, 0.8rem);
    color: rgba(255,255,255,0.45);
    font-weight: 500;
    text-transform: none;
  }
  .f-value {
    font-size: clamp(1.1rem, 2vw, 1.7rem);
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="l-logo">qiblah</div>
  <div class="l-dots"><div class="l-dot"></div><div class="l-dot"></div><div class="l-dot"></div></div>
</div>

<div id="error">
  <h2>Mosque not found</h2>
  <p id="err-msg">Check the URL and try again.</p>
</div>

<div id="app">

  <!-- LEFT -->
  <div class="left">
    <div class="clock-section">
      <div id="clock">—:——</div>
      <div id="uk-date">—</div>
      <div id="hijri-date">—</div>
    </div>

    <div class="mosque-section">
      <div id="mosque-logo-wrap">
        <div class="mosque-logo-placeholder" id="mosque-initial">M</div>
      </div>
      <div>
        <div class="mosque-name-text" id="mosque-name">—</div>
        <div class="mosque-address-text" id="mosque-address">—</div>
        <div class="mosque-website" id="mosque-website"></div>
      </div>
    </div>

    <div class="notice">
      <div class="notice-icon">📵</div>
      <div class="notice-text">Please ensure your mobile phone is silent in the prayer hall.</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="pt-header">
      <span></span>
      <span>Begins</span>
      <span>Jama'ah</span>
      <span>Tomorrow</span>
    </div>
    <div class="pt-rows" id="rows"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="f-cell">
      <div class="f-label">Sunrise</div>
      <div class="f-value" id="sunrise">—</div>
    </div>
    <div class="f-cell">
      <div class="f-label">Jummah Khutbah</div>
      <div class="f-value" id="jummah">—</div>
    </div>
  </footer>

</div>

<script>
const SB  = 'https://bfevwoykvnogmgxdkxdj.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZXZ3b3lrdm5vZ21neGRreGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDgwNjEsImV4cCI6MjA5MTcyNDA2MX0.8I--P9h_jYsSlvkthF76O1m0mcFkgI8mcRmKVgXOHAk';
const PRAYERS = ['fajr','zuhr','asr','maghrib','isha'];
const LABELS  = {fajr:'Fajr',zuhr:'Zuhr',asr:'Asr',maghrib:'Maghrib',isha:'Isha'};

function getSlug() {
  const m = location.pathname.match(/\/(?:display|tv|screen)\/([^/?#]+)/);
  if (m) return m[1];
  return new URLSearchParams(location.search).get('mosque');
}

async function sbGet(path) {
  const r = await fetch(SB + '/rest/v1/' + path, {
    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
  });
  if (!r.ok) throw new Error(path + ' ' + r.status);
  return r.json();
}

function fmt(s) {
  if (!s) return '—';
  s = s.trim();
  if (/[AP]M/i.test(s)) return s;
  const parts = s.split(':');
  const h = parseInt(parts[0]), m = parseInt(parts[1]);
  return (h % 12 || 12) + ':' + String(m).padStart(2,'0');
}

function toMins(s) {
  if (!s) return null;
  s = s.trim();
  const ap = s.match(/^(\d+):(\d+)\s*([AP]M)$/i);
  if (ap) {
    let h = +ap[1];
    if (ap[3].toUpperCase()==='PM' && h!==12) h+=12;
    if (ap[3].toUpperCase()==='AM' && h===12) h=0;
    return h*60 + +ap[2];
  }
  const pl = s.match(/^(\d+):(\d+)$/);
  if (pl) return +pl[1]*60 + +pl[2];
  return null;
}

function calcSunrise(lat, lon, d) {
  const rad = Math.PI/180;
  const dy = Math.floor((d - new Date(d.getFullYear(),0,0)) / 864e5);
  const B   = (360/365*(dy-81)) * rad;
  const EoT = 9.87*Math.sin(2*B) - 7.53*Math.cos(B) - 1.5*Math.sin(B);
  const dec = 23.45*Math.sin(B)*rad;
  const ha  = Math.acos(-Math.tan(lat*rad)*Math.tan(dec)) / rad;
  const sr  = 12 - lon/15 - EoT/60 - ha/15;
  const h = Math.floor(sr), m = Math.round((sr-h)*60);
  return (h%12||12) + ':' + String(m).padStart(2,'0');
}

function ukDate(d) {
  return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function hijriDate(d) {
  try { return new Intl.DateTimeFormat('en-TN-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(d); }
  catch(e) { return ''; }
}

function startClock() {
  function tick() {
    const now = new Date();
    const h = now.getHours()%12||12;
    const m = String(now.getMinutes()).padStart(2,'0');
    const ap = now.getHours()>=12 ? 'PM' : 'AM';
    document.getElementById('clock').textContent = h + ':' + m + ' ' + ap;
    document.getElementById('uk-date').textContent = ukDate(now);
    document.getElementById('hijri-date').textContent = hijriDate(now);
  }
  tick(); setInterval(tick, 1000);
}

function renderRows(tod, tom) {
  const cont = document.getElementById('rows');
  cont.innerHTML = '';
  PRAYERS.forEach(p => {
    const begins = tod[p+'_begins'] || '';
    const jamaah = tod[p+'_jamaah'];
    const tmr    = tom && tom[p+'_jamaah'];
    const parts  = begins.split(/[\n/\\|]/).map(s=>s.trim()).filter(Boolean);
    const beginsHtml = parts.length > 1
      ? parts.map(x => fmt(x)).join('<br>')
      : fmt(begins);

    const row = document.createElement('div');
    row.className = 'pt-row';
    row.dataset.p = p;
    row.innerHTML =
      '<div class="pt-name">' + LABELS[p] + '</div>' +
      '<div class="pt-cell pt-begins">' + beginsHtml + '</div>' +
      '<div class="pt-cell pt-jamaah">' + fmt(jamaah) + '</div>' +
      '<div class="pt-cell pt-tomorrow">' + (tmr ? fmt(tmr) : '—') + '</div>';
    cont.appendChild(row);
  });
}

function startCountdown(tod, tom) {
  function tick() {
    const now  = new Date();
    const nowS = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    let tPrayer = null;

    for (const p of PRAYERS) {
      const m = toMins(tod[p+'_jamaah']);
      if (m !== null && m*60 > nowS) { tPrayer = p; break; }
    }
    if (!tPrayer && tom) tPrayer = 'fajr';

    document.querySelectorAll('.pt-row').forEach(r => {
      r.classList.toggle('active', r.dataset.p === tPrayer);
    });
  }
  tick(); setInterval(tick, 1000);
}

async function init() {
  const slug   = getSlug();
  const loadEl = document.getElementById('loading');
  const appEl  = document.getElementById('app');
  const errEl  = document.getElementById('error');

  if (!slug) {
    loadEl.style.display = 'none'; errEl.classList.add('show');
    document.getElementById('err-msg').textContent = 'No mosque in URL.';
    return;
  }

  try {
    const mosques = await sbGet('mosques?select=id,name,address,area,jummah,lat,lon,website,url&slug=eq.' + slug + '&limit=1');
    const mosque  = mosques[0];
    if (!mosque) throw new Error('not found');

    const today = new Date().toISOString().split('T')[0];
    const tmrD  = new Date(); tmrD.setDate(tmrD.getDate()+1);
    const tmr   = tmrD.toISOString().split('T')[0];

    const prayers = await sbGet('prayer_timetables?select=*&mosque_id=eq.' + mosque.id + '&date=in.(' + today + ',' + tmr + ')&order=date.asc');
    const tod = prayers.find(p => p.date === today);
    const tom = prayers.find(p => p.date === tmr);
    if (!tod) throw new Error('no prayer times for today');

    // Populate left panel
    document.getElementById('mosque-name').textContent    = mosque.name;
    document.getElementById('mosque-address').textContent = mosque.address || mosque.area || '';
    document.getElementById('mosque-website').textContent = mosque.website || mosque.url || '';
    document.title = mosque.name + ' — Prayer Times';

    // Logo initial
    document.getElementById('mosque-initial').textContent = mosque.name.charAt(0).toUpperCase();

    // Jumu'ah
    if (mosque.jummah) {
      document.getElementById('jummah').textContent = mosque.jummah.split(/[,\n]/)[0].trim();
    }

    // Sunrise
    if (mosque.lat && mosque.lon) {
      document.getElementById('sunrise').textContent = calcSunrise(mosque.lat, mosque.lon, new Date());
    }

    renderRows(tod, tom);
    startClock();
    startCountdown(tod, tom);

    // Midnight reload
    const midnight = new Date(); midnight.setHours(24,0,30,0);
    setTimeout(() => location.reload(), midnight - new Date());

    loadEl.classList.add('out');
    setTimeout(() => { loadEl.style.display='none'; appEl.classList.add('visible'); }, 500);

  } catch(err) {
    console.error(err);
    loadEl.style.display='none'; errEl.classList.add('show');
    document.getElementById('err-msg').textContent =
      err.message === 'not found' ? 'No mosque with slug "' + slug + '".' : 'Error: ' + err.message;
  }
}

init();
</script>
</body>
</html>
