<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background: #0d1520;
    color:#fff;
    font-family:'Outfit',sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* LOADING */
  #loading {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
    background:#0d1520; z-index:100;
    transition:opacity 0.5s ease;
  }
  #loading.out { opacity:0; pointer-events:none; }
  .l-logo { font-size:2rem; font-weight:800; color:#c9a87a; letter-spacing:-0.02em; }
  .l-dots { display:flex; gap:7px; }
  .l-dot { width:7px; height:7px; border-radius:50%; background:#c9a87a; animation:ldot 1.2s ease-in-out infinite; }
  .l-dot:nth-child(2){animation-delay:.2s} .l-dot:nth-child(3){animation-delay:.4s}
  @keyframes ldot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

  /* ERROR */
  #error { position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:10px; background:#0d1520; z-index:99; }
  #error.show { display:flex; }
  #error h2 { font-size:1.6rem; font-weight:700; color:#c9a87a; }
  #error p { color:rgba(255,255,255,0.5); font-size:0.95rem; }

  /* APP WRAPPER */
  #app {
    height:100vh;
    padding: 28px 36px;
    display:flex;
    flex-direction:column;
    gap:16px;
    opacity:0;
    transition:opacity 0.6s ease;
  }
  #app.visible { opacity:1; }

  /* TOP LABEL */
  .top-label {
    font-size: clamp(0.7rem, 1vw, 0.85rem);
    font-weight:700;
    color:#c9a87a;
    text-transform:uppercase;
    letter-spacing:0.12em;
  }

  /* NEXT SALAH CARD */
  .next-card {
    background:#131e2e;
    border:1px solid rgba(201,168,122,0.25);
    border-radius:10px;
    padding:18px 28px;
    display:grid;
    grid-template-columns:1fr auto;
    align-items:end;
    gap:20px;
    position:relative;
    overflow:hidden;
  }
  .next-label {
    font-size:clamp(0.6rem,0.9vw,0.78rem);
    font-weight:600;
    color:rgba(255,255,255,0.45);
    text-transform:uppercase;
    letter-spacing:0.12em;
    margin-bottom:4px;
  }
  #next-prayer-name {
    font-size:clamp(1.4rem,3vw,2.4rem);
    font-weight:800;
    color:#fff;
    letter-spacing:-0.02em;
    line-height:1;
  }
  .countdown-label {
    font-size:clamp(0.6rem,0.9vw,0.78rem);
    font-weight:600;
    color:rgba(255,255,255,0.45);
    text-transform:uppercase;
    letter-spacing:0.12em;
    text-align:right;
    margin-bottom:4px;
  }
  #countdown {
    font-size:clamp(1.4rem,3vw,2.4rem);
    font-weight:800;
    color:#c9a87a;
    letter-spacing:-0.02em;
    font-variant-numeric:tabular-nums;
    text-align:right;
    line-height:1;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    position:absolute;
    bottom:0; left:0; right:0;
    height:3px;
    background:rgba(255,255,255,0.06);
  }
  #progress-bar {
    height:100%;
    background: linear-gradient(90deg, #9b7f4e, #c9a87a);
    width:0%;
    transition:width 1s linear;
    border-radius:0 2px 2px 0;
  }

  /* PRAYER TABLE */
  .prayer-table {
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  /* Header row */
  .pt-head {
    display:grid;
    grid-template-columns: 1.4fr 1fr 1.1fr 1fr;
    padding:0 0 12px 0;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .pt-head span {
    font-size:clamp(0.7rem,1.1vw,0.9rem);
    font-weight:600;
    color:rgba(255,255,255,0.4);
    text-align:center;
  }
  .pt-head span:first-child { text-align:left; }

  /* Prayer rows */
  .pt-body { flex:1; display:flex; flex-direction:column; }

  .pt-row {
    display:grid;
    grid-template-columns:1.4fr 1fr 1.1fr 1fr;
    flex:1;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
    transition:background 0.4s;
    padding:0 0;
  }
  .pt-row:last-child { border-bottom:none; }
  .pt-row.active { background:rgba(201,168,122,0.04); }

  .pt-name {
    font-size:clamp(1rem,1.8vw,1.5rem);
    font-weight:700;
    color:#fff;
    padding-left:0;
    letter-spacing:-0.01em;
  }

  .pt-cell { text-align:center; }

  .pt-begins {
    font-size:clamp(0.85rem,1.5vw,1.2rem);
    font-weight:400;
    color:rgba(255,255,255,0.5);
  }

  .pt-jamaah {
    font-size:clamp(1rem,1.8vw,1.5rem);
    font-weight:800;
    color:#fff;
    letter-spacing:-0.015em;
  }
  .pt-row.active .pt-jamaah { color:#fff; }

  .pt-tomorrow {
    font-size:clamp(0.85rem,1.5vw,1.2rem);
    font-weight:400;
    color:rgba(255,255,255,0.5);
    position:relative;
  }
  .pt-row.active .pt-tomorrow-inner {
    display:inline-block;
    color:#c9a87a;
  }
  .pt-row.active .pt-tomorrow-inner::after {
    content:'';
    display:block;
    height:2px;
    background:#c9a87a;
    border-radius:2px;
    margin-top:2px;
    width:100%;
  }

  /* JUMMAH SECTION */
  .jummah-section {
    padding-top:4px;
  }
  .jummah-title {
    font-size:clamp(0.85rem,1.3vw,1.1rem);
    font-weight:700;
    color:#fff;
    margin-bottom:8px;
  }
  .jummah-pill {
    display:inline-block;
    background:#131e2e;
    border:1px solid rgba(201,168,122,0.35);
    color:#c9a87a;
    font-size:clamp(0.8rem,1.3vw,1rem);
    font-weight:700;
    padding:6px 16px;
    border-radius:6px;
    letter-spacing:-0.01em;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="l-logo">qiblah</div>
  <div class="l-dots"><div class="l-dot"></div><div class="l-dot"></div><div class="l-dot"></div></div>
</div>
<div id="error">
  <h2>Mosque not found</h2>
  <p id="err-msg">Check the URL and try again.</p>
</div>

<div id="app">

  <div class="top-label">Prayer Times</div>

  <!-- Next salah card -->
  <div class="next-card">
    <div>
      <div class="next-label">Next Salah</div>
      <div id="next-prayer-name">—</div>
    </div>
    <div>
      <div class="countdown-label">Jam'ah Starts In</div>
      <div id="countdown">—:——:——</div>
    </div>
    <div class="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- Prayer table -->
  <div class="prayer-table">
    <div class="pt-head">
      <span></span>
      <span>Begins</span>
      <span>Jama'ah</span>
      <span>Tomorrow</span>
    </div>
    <div class="pt-body" id="rows"></div>
  </div>

  <!-- Jummah -->
  <div class="jummah-section">
    <div class="jummah-title">Jummah</div>
    <div class="jummah-pill" id="jummah">—</div>
  </div>

</div>

<script>
const SB  = 'https://bfevwoykvnogmgxdkxdj.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZXZ3b3lrdm5vZ21neGRreGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDgwNjEsImV4cCI6MjA5MTcyNDA2MX0.8I--P9h_jYsSlvkthF76O1m0mcFkgI8mcRmKVgXOHAk';
const PRAYERS = ['fajr','zuhr','asr','maghrib','isha'];
const LABELS  = {fajr:'Fajr',zuhr:'Zuhr',asr:'Asr',maghrib:'Maghrib',isha:'Isha'};

function getSlug() {
  const m = location.pathname.match(/\/(?:display|tv|screen)\/([^/?#]+)/);
  if (m) return m[1];
  return new URLSearchParams(location.search).get('mosque');
}

async function sbGet(path) {
  const r = await fetch(SB + '/rest/v1/' + path, {
    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
  });
  if (!r.ok) throw new Error(path + ' ' + r.status);
  return r.json();
}

function fmt(s) {
  if (!s) return '—';
  s = s.trim();
  if (/[AP]M/i.test(s)) return s;
  const p = s.split(':');
  const h = parseInt(p[0]), m = parseInt(p[1]);
  return (h%12||12) + ':' + String(m).padStart(2,'0') + ' ' + (h>=12?'PM':'AM');
}

function toSecs(s) {
  if (!s) return null;
  s = s.trim();
  const ap = s.match(/^(\d+):(\d+)\s*([AP]M)$/i);
  if (ap) {
    let h = +ap[1];
    if (ap[3].toUpperCase()==='PM' && h!==12) h+=12;
    if (ap[3].toUpperCase()==='AM' && h===12) h=0;
    return h*3600 + +ap[2]*60;
  }
  const pl = s.match(/^(\d+):(\d+)$/);
  if (pl) return +pl[1]*3600 + +pl[2]*60;
  return null;
}

function renderRows(tod, tom) {
  const cont = document.getElementById('rows');
  cont.innerHTML = '';
  PRAYERS.forEach(p => {
    const begins = tod[p+'_begins'] || '';
    const jamaah = tod[p+'_jamaah'];
    const tmrJam = tom && tom[p+'_jamaah'];
    // Asr can have two begins times
    const parts = begins.split(/[\n\/\\|]/).map(s=>s.trim()).filter(Boolean);
    // Use the last begins time (Hanafi) for display
    const beginsDisplay = parts.length > 1 ? fmt(parts[parts.length-1]) : fmt(begins);

    const row = document.createElement('div');
    row.className = 'pt-row';
    row.dataset.p = p;
    row.innerHTML =
      '<div class="pt-name">' + LABELS[p] + '</div>' +
      '<div class="pt-cell pt-begins">' + beginsDisplay + '</div>' +
      '<div class="pt-cell pt-jamaah">' + fmt(jamaah) + '</div>' +
      '<div class="pt-cell pt-tomorrow"><span class="pt-tomorrow-inner">' + (tmrJam ? fmt(tmrJam) : '—') + '</span></div>';
    cont.appendChild(row);
  });
}

// Progress: how far through current period we are
let prevJamaahSecs = null;

function startCountdown(tod, tom) {
  const cdEl   = document.getElementById('countdown');
  const nameEl = document.getElementById('next-prayer-name');
  const bar    = document.getElementById('progress-bar');

  function tick() {
    const now  = new Date();
    const nowS = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

    let targetS = null, tPrayer = null, prevS = null;

    for (let i = 0; i < PRAYERS.length; i++) {
      const p = PRAYERS[i];
      const s = toSecs(tod[p+'_jamaah']);
      if (s !== null && s > nowS) {
        targetS  = s;
        tPrayer  = p;
        // prev jamaah = last one before this
        for (let j = i-1; j >= 0; j--) {
          const ps = toSecs(tod[PRAYERS[j]+'_jamaah']);
          if (ps !== null) { prevS = ps; break; }
        }
        break;
      }
    }

    // All passed — next is tomorrow's Fajr
    if (!tPrayer && tom) {
      tPrayer = 'fajr';
      const s = toSecs(tom.fajr_jamaah);
      if (s !== null) targetS = 24*3600 + s;
      const lastToday = toSecs(tod.isha_jamaah);
      if (lastToday !== null) prevS = lastToday;
    }

    // Highlight row
    document.querySelectorAll('.pt-row').forEach(r => {
      r.classList.toggle('active', r.dataset.p === tPrayer);
    });

    if (tPrayer) {
      nameEl.textContent = LABELS[tPrayer];
      const diff = targetS - nowS;
      const hh = Math.floor(diff/3600);
      const mm = Math.floor(diff%3600/60);
      const ss = diff%60;
      cdEl.textContent = hh > 0
        ? hh + ':' + String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0')
        : mm + ':' + String(ss).padStart(2,'0');

      // Progress bar: from prevS to targetS
      if (prevS !== null && targetS !== null) {
        const total = targetS - prevS;
        const elapsed = nowS - prevS;
        const pct = Math.min(100, Math.max(0, (elapsed/total)*100));
        bar.style.width = pct + '%';
      }
    }
  }

  tick(); setInterval(tick, 1000);
}

async function init() {
  const slug   = getSlug();
  const loadEl = document.getElementById('loading');
  const appEl  = document.getElementById('app');
  const errEl  = document.getElementById('error');

  if (!slug) {
    loadEl.style.display='none'; errEl.classList.add('show');
    document.getElementById('err-msg').textContent = 'No mosque in URL.';
    return;
  }

  try {
    const mosques = await sbGet('mosques?select=id,name,address,area,jummah,lat,lon,website&slug=eq.' + slug + '&limit=1');
    const mosque  = mosques[0];
    if (!mosque) throw new Error('not found');

    const today = new Date().toISOString().split('T')[0];
    const tmrD  = new Date(); tmrD.setDate(tmrD.getDate()+1);
    const tmr   = tmrD.toISOString().split('T')[0];

    const prayers = await sbGet('prayer_timetables?select=*&mosque_id=eq.' + mosque.id + '&date=in.(' + today + ',' + tmr + ')&order=date.asc');
    const tod = prayers.find(p => p.date === today);
    const tom = prayers.find(p => p.date === tmr);
    if (!tod) throw new Error('no prayer times for today');

    document.title = mosque.name + ' — Prayer Times';

    // Jumu'ah pills
    const jummahEl = document.getElementById('jummah');
    if (mosque.jummah) {
      const times = mosque.jummah.split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
      jummahEl.innerHTML = times.map(t => '<span class="jummah-pill">' + t + '</span>').join(' ');
    } else {
      jummahEl.closest('.jummah-section').style.display = 'none';
    }

    renderRows(tod, tom);
    startCountdown(tod, tom);

    // Midnight reload
    const midnight = new Date(); midnight.setHours(24,0,30,0);
    setTimeout(() => location.reload(), midnight - new Date());

    loadEl.classList.add('out');
    setTimeout(() => { loadEl.style.display='none'; appEl.classList.add('visible'); }, 500);

  } catch(err) {
    console.error(err);
    loadEl.style.display='none'; errEl.classList.add('show');
    document.getElementById('err-msg').textContent =
      err.message === 'not found' ? 'No mosque with slug "' + slug + '".' : 'Error: ' + err.message;
  }
}

init();
</script>
</body>
</html>
